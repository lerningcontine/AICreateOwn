<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="RAG流程图">
  <rect width="1200" height="620" fill="#fbfcf8"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#182029">RAG 知识库流程</text>
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="18" fill="#687381">离线阶段负责建库，在线阶段负责检索和生成。</text>
  <defs>
    <marker id="arrowRag" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#687381"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <text x="70" y="168" font-size="24" font-weight="700" fill="#3d7dd8">离线建库</text>
    <rect x="70" y="205" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="145" y="248" text-anchor="middle" font-size="18" fill="#182029">原始文档</text>
    <rect x="270" y="205" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="345" y="248" text-anchor="middle" font-size="18" fill="#182029">解析清洗</text>
    <rect x="470" y="205" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="545" y="248" text-anchor="middle" font-size="18" fill="#182029">文档切块</text>
    <rect x="670" y="205" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="745" y="248" text-anchor="middle" font-size="18" fill="#182029">Embedding</text>
    <rect x="870" y="205" width="190" height="72" rx="10" fill="#4fb286"/>
    <text x="965" y="248" text-anchor="middle" font-size="18" font-weight="700" fill="white">向量库</text>
    <text x="70" y="370" font-size="24" font-weight="700" fill="#ef6f6c">在线问答</text>
    <rect x="70" y="407" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="145" y="450" text-anchor="middle" font-size="18" fill="#182029">用户问题</text>
    <rect x="270" y="407" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="345" y="450" text-anchor="middle" font-size="18" fill="#182029">问题改写</text>
    <rect x="470" y="407" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="545" y="450" text-anchor="middle" font-size="18" fill="#182029">检索 Top K</text>
    <rect x="670" y="407" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="745" y="450" text-anchor="middle" font-size="18" fill="#182029">Rerank</text>
    <rect x="870" y="407" width="150" height="72" rx="10" fill="white" stroke="#dfe6df" stroke-width="2"/>
    <text x="945" y="450" text-anchor="middle" font-size="18" fill="#182029">组装上下文</text>
    <rect x="1050" y="407" width="100" height="72" rx="10" fill="#182029"/>
    <text x="1100" y="450" text-anchor="middle" font-size="18" fill="white">回答</text>
  </g>
  <g stroke="#687381" stroke-width="3" fill="none" marker-end="url(#arrowRag)">
    <path d="M220 241 H268"/>
    <path d="M420 241 H468"/>
    <path d="M620 241 H668"/>
    <path d="M820 241 H868"/>
    <path d="M220 443 H268"/>
    <path d="M420 443 H468"/>
    <path d="M620 443 H668"/>
    <path d="M820 443 H868"/>
    <path d="M1020 443 H1048"/>
    <path d="M965 277 C965 335 565 335 545 405"/>
  </g>
</svg>

